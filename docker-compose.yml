version: '3.9'

services:
  # PostgreSQL Database with PostGIS extension
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nexus_sentinel_db
    environment:
      POSTGRES_USER: ${DB_USER:-nexus_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sentinel_secure_2024}
      POSTGRES_DB: ${DB_NAME:-nexus_sentinel}
      POSTGRES_INITDB_ARGS: "-c timezone=UTC"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/infrastructure/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    container_name: nexus_sentinel_cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus_sentinel_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-nexus_admin}:${DB_PASSWORD:-sentinel_secure_2024}@postgres:5432/${DB_NAME:-nexus_sentinel}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_TITLE: ${API_TITLE:-Nexus SENTINEL API}
      API_VERSION: ${API_VERSION:-1.0.0}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - nexus_network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_MAP_TILE_URL: ${VITE_MAP_TILE_URL:-https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png}
    container_name: nexus_sentinel_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - nexus_network
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_MAP_TILE_URL: ${VITE_MAP_TILE_URL:-https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nexus_network:
    driver: bridge
